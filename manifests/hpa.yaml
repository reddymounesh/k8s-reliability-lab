apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taskapi-hpa
  namespace: task-app

spec:
  scaleTargetRef:
    apiVersion: app/v1
    kind: Deployment
    name: taskapi

  
  minReplicas: 2
  maxReplicas: 8

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          #when average CPU across all pods exceeds 50% of their REQUEST
          #HPA adds more replicas
          #Example: 3 pods each using 70% --> SCALE UP
          #Example: 3 pods each using 20% --> scale down

          averageUtilization: 50
  
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30

    scaleDown:
      stabilizationWindowSeconds: 300
      